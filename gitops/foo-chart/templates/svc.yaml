apiVersion: v1
kind: Service
metadata:
  name: node-port-service
spec:
  ports:
    - name: minecraft
      nodePort: 30001
      port: 30001
      protocol: TCP
      targetPort: minecraft
  type: NodePort

---
# NWP to allow all traffic in a namespace

kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-all-traffic
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {}
  egress:
  - {}
