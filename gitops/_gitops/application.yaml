apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homelab-app
  namespace: openshift-gitops
spec:
  project: default
  source:
    # Nutze HTTPS für öffentlichen Zugriff ohne SSH-Keys
    repoURL: https://github.com/k-stz/homelab.git
    targetRevision: HEAD
    path: gitops/homelab # Pfad zum Ordner, in dem die Chart.yaml liegt
    helm:
      # Hier kannst du Werte direkt im YAML überschreiben
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: homelab-target-ns # Dein Ziel-Namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# enable serviceaccoutn to apply stuff
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: argocd
subjects:
  - kind: ServiceAccount
    name: openshift-gitops-argocd-application-controller
    namespace: openshift-gitops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
---
